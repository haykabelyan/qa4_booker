name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Тег для запуска (all — все группы)'
        required: true
        type: choice
        default: all
        options:
          - all
          - '@booker'
          - '@auth'
          - '@get'
          - '@posts'

jobs:
  test:
    name: test (${{ matrix.tag }})
    timeout-minutes: 60
    runs-on: ubuntu-latest
    if: >-
      github.event_name != 'workflow_dispatch'
      || github.event.inputs.tag == 'all'
      || github.event.inputs.tag == matrix.tag
    strategy:
      fail-fast: false
      matrix:
        tag:
          - '@booker'
          - '@auth'
          - '@get'
          - '@posts'
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test --grep "${{ matrix.tag }}"
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-${{ matrix.tag }}
        path: playwright-report/
        retention-days: 30
